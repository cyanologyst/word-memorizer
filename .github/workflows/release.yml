name: Build signed Windows release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore signing certificate
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          New-Item -ItemType Directory -Path installer/certs -Force | Out-Null
          [IO.File]::WriteAllBytes(
            "installer/certs/WordReviewReminder.pfx",
            [Convert]::FromBase64String($env:CERTIFICATE_BASE64))

      - name: Build and test
        shell: pwsh
        run: |
          dotnet test .\WordReviewReminder.Tests\WordReviewReminder.Tests.csproj -p:Platform=x64 -c Release

      - name: Build signed Setup, MSI, MSIX, and App Installer feed
        shell: pwsh
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $semanticVersion = "${{ github.ref_name }}" -replace '^v', ''
          $packageVersion = "$semanticVersion.0"
          .\scripts\Build-Release.ps1 `
            -Version $packageVersion `
            -CertificatePassword $env:CERTIFICATE_PASSWORD

      - name: Verify release artifacts
        shell: pwsh
        run: |
          $semanticVersion = "${{ github.ref_name }}" -replace '^v', ''
          .\scripts\Test-ReleaseArtifacts.ps1 -Version "$semanticVersion.0"

      - name: Publish GitHub release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/release/* `
            --generate-notes `
            --title "Word Review Reminder ${{ github.ref_name }}"
